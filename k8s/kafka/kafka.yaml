# ──────────────────────────────────────────────────────────────────────────────
# Kafka broker — StatefulSet (single replica for dev/demo)
# Namespace: streaming
#
# Internal broker address (all services in cluster use this):
#   kafka-service.streaming.svc.cluster.local:9092
#
# StatefulSet is used instead of Deployment so that:
#   - Each pod has a stable network identity (kafka-0)
#   - PVC data survives pod restarts (no data loss on reschedule)
#   - Ordered startup/shutdown semantics
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: streaming
  labels:
    app: kafka
    app.kubernetes.io/part-of: ecuador-sales-mlops
spec:
  serviceName: kafka-headless    # governs pod DNS: kafka-0.kafka-headless.streaming.svc.cluster.local
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - name: kafka
              containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper.streaming.svc.cluster.local:2181"

            # Use the headless-service pod FQDN so the broker can resolve its
            # own address (ClusterIP routing back to self fails on some CNIs).
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-0.kafka-headless.streaming.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            # Single-broker — all replication factors set to 1
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"

            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "100"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - kafka-topics --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 10

  # PVC template: one 5 Gi volume per pod, persists across restarts
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
        labels:
          app: kafka
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# ClusterIP Service — the stable DNS entry used by all application services
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: streaming
  labels:
    app: kafka
    app.kubernetes.io/part-of: ecuador-sales-mlops
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: kafka

---
# Headless Service — gives each StatefulSet pod its own DNS record
# (kafka-0.kafka-headless.streaming.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: streaming
  labels:
    app: kafka
    app.kubernetes.io/part-of: ecuador-sales-mlops
spec:
  clusterIP: None
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: kafka
