# ──────────────────────────────────────────────────────────────────────────────
# Prometheus — metrics collection and storage
# Namespace: monitoring
#
# Static scrape targets (cross-namespace FQDN):
#   ml-inference   inference.svc:5000/metrics
#   ai-agent       agent.svc:5001/metrics
#   web-ui         frontend.svc:5002/metrics
#   kafka-consumer streaming.svc:8003/metrics
#
# NodePort 30900 → access via:
#   http://$(minikube ip):30900
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: ecuador-sales-mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: ecuador-sales-mlops
        env: minikube

    scrape_configs:
      - job_name: 'ml-inference'
        static_configs:
          - targets: ['ml-inference.inference.svc.cluster.local:5000']
        metrics_path: /metrics

      - job_name: 'ai-agent'
        static_configs:
          - targets: ['ai-agent.agent.svc.cluster.local:5001']
        metrics_path: /metrics

      - job_name: 'web-ui'
        static_configs:
          - targets: ['web-ui.frontend.svc.cluster.local:5002']
        metrics_path: /metrics

      - job_name: 'kafka-consumer'
        static_configs:
          - targets: ['kafka-consumer.streaming.svc.cluster.local:8003']
        metrics_path: /metrics

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: ecuador-sales-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - name: http
              containerPort: 9090

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus

      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}    # ephemeral — restart loses data; use PVC for persistence

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/part-of: ecuador-sales-mlops
spec:
  type: NodePort
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30900
  selector:
    app: prometheus
