# ──────────────────────────────────────────────────────────────────────────────
# API key Secrets — one per namespace that needs external credentials
#
# IMPORTANT: Replace the base64 placeholders before applying.
# Generate the correct value with:
#   echo -n "your-actual-key" | base64
#
# Apply:
#   kubectl apply -f k8s/secret-global.yaml
#
# For production use, manage these with Sealed Secrets, Vault, or
# kubectl create secret generic instead of committing real keys.
# ──────────────────────────────────────────────────────────────────────────────

# ── training namespace — W&B key ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: training
  labels:
    app.kubernetes.io/part-of: ecuador-sales-mlops
type: Opaque
data:
  # echo -n "your-wandb-api-key" | base64
  WANDB_API_KEY: cmVwbGFjZS1tZS13YW5kYg==   # replace-me-wandb

---
# ── agent namespace — Groq key ────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: agent
  labels:
    app.kubernetes.io/part-of: ecuador-sales-mlops
type: Opaque
data:
  # echo -n "your-groq-api-key" | base64
  GROQ_API_KEY: cmVwbGFjZS1tZS1ncm9x         # replace-me-groq
